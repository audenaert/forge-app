enum ObjectiveStatus { ACTIVE PAUSED ACHIEVED ABANDONED }
enum OpportunityStatus { ACTIVE PAUSED RESOLVED ABANDONED }
enum IdeaStatus { DRAFT EXPLORING VALIDATED READY_FOR_BUILD BUILDING SHIPPED }
enum AssumptionStatus { UNTESTED VALIDATED INVALIDATED }
enum AssumptionImportance { HIGH MEDIUM LOW }
enum AssumptionEvidence { HIGH MEDIUM LOW }
enum ExperimentStatus { PLANNED RUNNING COMPLETE }
enum ExperimentMethod {
  USER_INTERVIEW PROTOTYPE_TEST FAKE_DOOR
  CONCIERGE_MVP DATA_ANALYSIS AB_TEST SURVEY
}
enum ExperimentResult { VALIDATED INVALIDATED INCONCLUSIVE }

type Objective @node {
  id: ID! @id
  name: String!
  status: ObjectiveStatus!
  body: String
  createdAt: DateTime! @timestamp(operations: [CREATE])
  updatedAt: DateTime @timestamp(operations: [UPDATE])
  domain: Domain @relationship(type: "BELONGS_TO", direction: OUT)
  supportedBy: [Opportunity!]! @relationship(type: "SUPPORTS", direction: IN)
}

type Opportunity @node {
  id: ID! @id
  name: String!
  status: OpportunityStatus!
  hmw: String
  body: String
  createdAt: DateTime! @timestamp(operations: [CREATE])
  updatedAt: DateTime @timestamp(operations: [UPDATE])
  domain: Domain @relationship(type: "BELONGS_TO", direction: OUT)
  supports: [Objective!]! @relationship(type: "SUPPORTS", direction: OUT)
  addressedBy: [Idea!]! @relationship(type: "ADDRESSES", direction: IN)
}

type Idea @node {
  id: ID! @id
  name: String!
  status: IdeaStatus!
  body: String
  createdAt: DateTime! @timestamp(operations: [CREATE])
  updatedAt: DateTime @timestamp(operations: [UPDATE])
  domain: Domain @relationship(type: "BELONGS_TO", direction: OUT)
  addresses: [Opportunity!]! @relationship(type: "ADDRESSES", direction: OUT)
  assumptions: [Assumption!]! @relationship(type: "ASSUMED_BY", direction: IN)
}

type Assumption @node {
  id: ID! @id
  name: String!
  status: AssumptionStatus!
  importance: AssumptionImportance!
  evidence: AssumptionEvidence!
  body: String
  createdAt: DateTime! @timestamp(operations: [CREATE])
  updatedAt: DateTime @timestamp(operations: [UPDATE])
  domain: Domain @relationship(type: "BELONGS_TO", direction: OUT)
  assumedBy: [Idea!]! @relationship(type: "ASSUMED_BY", direction: OUT)
  testedBy: [Experiment!]! @relationship(type: "TESTS", direction: IN)
}

type Experiment @node {
  id: ID! @id
  name: String!
  status: ExperimentStatus!
  method: ExperimentMethod
  successCriteria: String
  duration: String
  effort: EffortLevel
  result: ExperimentResult
  learnings: String
  body: String
  createdAt: DateTime! @timestamp(operations: [CREATE])
  updatedAt: DateTime @timestamp(operations: [UPDATE])
  domain: Domain @relationship(type: "BELONGS_TO", direction: OUT)
  tests: [Assumption!]! @relationship(type: "TESTS", direction: OUT)
}

# --- Traversal return types (non-@node, computed projections) ---

type ExperimentSummary {
  id: ID!
  name: String!
  status: ExperimentStatus!
  method: ExperimentMethod
  result: ExperimentResult
}

type AssumptionWithExperiments {
  id: ID!
  name: String!
  status: AssumptionStatus!
  importance: AssumptionImportance!
  evidence: AssumptionEvidence!
  experiments: [ExperimentSummary!]!
}

type IdeaWithAssumptions {
  id: ID!
  name: String!
  status: IdeaStatus!
  assumptions: [AssumptionWithExperiments!]!
}

type OpportunitySubgraph {
  id: ID!
  name: String!
  status: OpportunityStatus!
  hmw: String
  ideas: [IdeaWithAssumptions!]!
}

type OpportunityWithIdeas {
  id: ID!
  name: String!
  status: OpportunityStatus!
  hmw: String
  ideas: [IdeaWithAssumptions!]!
}

type ObjectiveSubgraphResult {
  id: ID!
  name: String!
  status: ObjectiveStatus!
  body: String
  opportunities: [OpportunityWithIdeas!]!
}

type ParentIdeaRef {
  id: ID!
  name: String!
  status: IdeaStatus!
}

type UntestedAssumptionWithContext {
  id: ID!
  name: String!
  status: AssumptionStatus!
  importance: AssumptionImportance!
  evidence: AssumptionEvidence!
  body: String
  createdAt: DateTime!
  updatedAt: DateTime
  parentIdea: ParentIdeaRef
}

type DiscoveryHealth {
  totalObjectives: Int!
  totalOpportunities: Int!
  totalIdeas: Int!
  totalAssumptions: Int!
  totalExperiments: Int!
  untestedHighImportanceAssumptions: Int!
  ideasWithNoAssumptions: Int!
  orphanedOpportunities: Int!
}

# --- Custom traversal queries ---

type Query {
  # Domain scoping: every nested level is re-scoped to the queried domain.
  # Cross-domain edges (e.g., an Idea in D2 that ADDRESSES an Opportunity in D1)
  # are invisible to this query — they are treated as if they do not exist.
  # This matches the product invariant that OST relationships belong within a
  # single domain and aligns opportunitySubgraph with objectiveSubgraph.
  opportunitySubgraph(opportunityId: ID!, domainSlug: String!): OpportunitySubgraph
    @cypher(
      statement: """
      MATCH (opp:Opportunity {id: $opportunityId})-[:BELONGS_TO]->(d:Domain {slug: $domainSlug})
      CALL {
        WITH opp, d
        OPTIONAL MATCH (opp)<-[:ADDRESSES]-(idea:Idea)-[:BELONGS_TO]->(d)
        CALL {
          WITH idea, d
          OPTIONAL MATCH (idea)<-[:ASSUMED_BY]-(assumption:Assumption)-[:BELONGS_TO]->(d)
          CALL {
            WITH assumption, d
            OPTIONAL MATCH (assumption)<-[:TESTS]-(exp:Experiment)-[:BELONGS_TO]->(d)
            RETURN collect(exp { .id, .name, .status, .method, .result }) AS experiments
          }
          RETURN collect(assumption { .id, .name, .status, .importance, .evidence, experiments: experiments }) AS assumptions
        }
        RETURN collect(idea { .id, .name, .status, assumptions: assumptions }) AS ideas
      }
      RETURN opp { .id, .name, .status, .hmw, ideas: ideas } AS result
      """
      columnName: "result"
    )

  objectiveSubgraph(objectiveId: ID!, domainSlug: String!): ObjectiveSubgraphResult
    @cypher(
      statement: """
      MATCH (obj:Objective {id: $objectiveId})-[:BELONGS_TO]->(d:Domain {slug: $domainSlug})
      CALL {
        WITH obj, d
        OPTIONAL MATCH (obj)<-[:SUPPORTS]-(opp:Opportunity)-[:BELONGS_TO]->(d)
        CALL {
          WITH opp, d
          OPTIONAL MATCH (opp)<-[:ADDRESSES]-(idea:Idea)-[:BELONGS_TO]->(d)
          CALL {
            WITH idea, d
            OPTIONAL MATCH (idea)<-[:ASSUMED_BY]-(assumption:Assumption)-[:BELONGS_TO]->(d)
            CALL {
              WITH assumption, d
              OPTIONAL MATCH (assumption)<-[:TESTS]-(exp:Experiment)-[:BELONGS_TO]->(d)
              RETURN collect(exp { .id, .name, .status, .method, .result }) AS experiments
            }
            RETURN collect(assumption { .id, .name, .status, .importance, .evidence, experiments: experiments }) AS assumptions
          }
          RETURN collect(idea { .id, .name, .status, assumptions: assumptions }) AS ideas
        }
        RETURN collect(opp { .id, .name, .status, .hmw, ideas: ideas }) AS opportunities
      }
      RETURN obj { .id, .name, .status, .body, opportunities: opportunities } AS result
      """
      columnName: "result"
    )

  # Cartesian-product semantics + cross-domain filtering:
  # An assumption may be linked to multiple parent ideas via ASSUMED_BY. To keep
  # the result set "one row per assumption" (what the UI expects), we pick a
  # single deterministic parent idea per assumption: the earliest-created idea
  # that belongs to the same domain, tie-broken by idea.id ("first parent"
  # semantics).
  #
  # Cross-domain edges are invisible. An assumption whose only ASSUMED_BY edge
  # points at an idea in a different domain is treated as if that edge does not
  # exist. Such an assumption only appears if it has zero parent ideas anywhere
  # (genuinely unrooted). If it has at least one in-domain parent idea, it
  # appears with that in-domain idea as `parentIdea`. This matches the product
  # invariant that OST relationships must belong within a single domain.
  untestedAssumptions(domainSlug: String!, minImportance: String): [UntestedAssumptionWithContext!]!
    @cypher(
      statement: """
      MATCH (a:Assumption)-[:BELONGS_TO]->(d:Domain {slug: $domainSlug})
      WHERE a.status = 'UNTESTED'
        AND (CASE WHEN $minImportance IS NOT NULL THEN a.importance = $minImportance ELSE true END)
        AND NOT EXISTS { (a)<-[:TESTS]-(:Experiment) }
        AND (
          NOT EXISTS { (a)-[:ASSUMED_BY]->(:Idea) }
          OR EXISTS { (a)-[:ASSUMED_BY]->(:Idea)-[:BELONGS_TO]->(d) }
        )
      CALL {
        WITH a, d
        OPTIONAL MATCH (a)-[:ASSUMED_BY]->(idea:Idea)-[:BELONGS_TO]->(d)
        WITH idea ORDER BY idea.createdAt ASC, idea.id ASC
        LIMIT 1
        RETURN idea AS parentIdea
      }
      WITH a, parentIdea
      ORDER BY a.importance DESC, a.createdAt ASC
      RETURN a {
        .id, .name, .status, .importance, .evidence, .body, .createdAt, .updatedAt,
        parentIdea: CASE WHEN parentIdea IS NULL THEN NULL ELSE parentIdea { .id, .name, .status } END
      } AS result
      """
      columnName: "result"
    )

  # Orphan detection is scoped to in-domain parents only. An artifact whose only
  # parent edge points at a node in a different domain is treated as orphaned
  # from the queried domain's point of view — cross-domain edges are invisible
  # on read.
  orphanedOpportunities(domainSlug: String!): [Opportunity!]!
    @cypher(
      statement: """
      MATCH (o:Opportunity)-[:BELONGS_TO]->(d:Domain {slug: $domainSlug})
      WHERE NOT EXISTS { (o)-[:SUPPORTS]->(:Objective)-[:BELONGS_TO]->(d) }
      RETURN o
      ORDER BY o.createdAt ASC
      """
      columnName: "o"
    )

  unrootedIdeas(domainSlug: String!): [Idea!]!
    @cypher(
      statement: """
      MATCH (i:Idea)-[:BELONGS_TO]->(d:Domain {slug: $domainSlug})
      WHERE NOT EXISTS { (i)-[:ADDRESSES]->(:Opportunity)-[:BELONGS_TO]->(d) }
      RETURN i
      ORDER BY i.createdAt ASC
      """
      columnName: "i"
    )

  unrootedAssumptions(domainSlug: String!): [Assumption!]!
    @cypher(
      statement: """
      MATCH (a:Assumption)-[:BELONGS_TO]->(d:Domain {slug: $domainSlug})
      WHERE NOT EXISTS { (a)-[:ASSUMED_BY]->(:Idea)-[:BELONGS_TO]->(d) }
      RETURN a
      ORDER BY a.importance DESC, a.createdAt ASC
      """
      columnName: "a"
    )

  discoveryHealth(domainSlug: String!): DiscoveryHealth
    @cypher(
      statement: """
      MATCH (d:Domain {slug: $domainSlug})
      CALL { WITH d MATCH (n:Objective)-[:BELONGS_TO]->(d) RETURN count(n) AS totalObjectives }
      CALL { WITH d MATCH (n:Opportunity)-[:BELONGS_TO]->(d) RETURN count(n) AS totalOpportunities }
      CALL { WITH d MATCH (n:Idea)-[:BELONGS_TO]->(d) RETURN count(n) AS totalIdeas }
      CALL { WITH d MATCH (n:Assumption)-[:BELONGS_TO]->(d) RETURN count(n) AS totalAssumptions }
      CALL { WITH d MATCH (n:Experiment)-[:BELONGS_TO]->(d) RETURN count(n) AS totalExperiments }
      CALL {
        WITH d
        MATCH (a:Assumption)-[:BELONGS_TO]->(d)
        WHERE a.status = 'UNTESTED' AND a.importance = 'HIGH'
          AND NOT EXISTS { (a)<-[:TESTS]-(:Experiment) }
        RETURN count(a) AS untestedHighImportanceAssumptions
      }
      CALL {
        WITH d
        MATCH (i:Idea)-[:BELONGS_TO]->(d)
        WHERE NOT EXISTS { (i)<-[:ASSUMED_BY]-(:Assumption) }
        RETURN count(i) AS ideasWithNoAssumptions
      }
      CALL {
        WITH d
        MATCH (o:Opportunity)-[:BELONGS_TO]->(d)
        WHERE NOT EXISTS { (o)-[:SUPPORTS]->(:Objective) }
        RETURN count(o) AS orphanedOpportunities
      }
      RETURN {
        totalObjectives: totalObjectives,
        totalOpportunities: totalOpportunities,
        totalIdeas: totalIdeas,
        totalAssumptions: totalAssumptions,
        totalExperiments: totalExperiments,
        untestedHighImportanceAssumptions: untestedHighImportanceAssumptions,
        ideasWithNoAssumptions: ideasWithNoAssumptions,
        orphanedOpportunities: orphanedOpportunities
      } AS result
      """
      columnName: "result"
    )
}
