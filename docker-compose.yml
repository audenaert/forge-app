services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"  # HTTP (browser)
      - "7687:7687"  # Bolt (driver)
    environment:
      NEO4J_AUTH: neo4j/forgedev
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
